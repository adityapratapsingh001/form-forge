<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Dashboard</title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <nav class="dashboard-navbar">

    <h2>
      FormMaker 🚀
    </h2>

   <a
  href="/auth/logout"
  class="logout-btn"
>
  Logout
</a>

  </nav>

  <div class="dashboard-container">

    <div class="dashboard-card">

      <h1>
        Generate Google Form
      </h1>

      <p class="subtitle">
        Paste questions and
        create Google Forms
        instantly
      </p>

      <label>
        Paste Questions
      </label>

      <textarea
        id="questions"
        placeholder="Paste your questions here..."
      ></textarea>

      <label>
        Question Type
      </label>

      <select id="questionType">

        <option value="MCQ">
          MCQ
        </option>

        <option value="Checkbox">
          Checkbox
        </option>

        <option value="Dropdown">
          Dropdown
        </option>

      </select>

      <button
        id="generateBtn"
        class="generate-btn"
      >
        Generate Form 🚀
      </button>

      <div id="result"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
